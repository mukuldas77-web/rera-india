name: RERA crawl

on:
  schedule:
    - cron: "0 22 * * *"        # 22:00 UTC daily = 03:30 IST. Adjust as needed.
  workflow_dispatch:            # lets you run it on demand from the Actions tab

permissions:
  contents: write               # allows committing the refreshed data back

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 330        # under the 6h job cap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape (all implemented states)
        run: |
          python run.py || true
          python export_json.py

      - name: Commit refreshed data
        run: |
          git config user.name  "rera-bot"
          git config user.email "rera-bot@users.noreply.github.com"
          git add rera_data.sqlite docs/projects.json
          git commit -m "data: automated RERA refresh $(date -u +%F)" || echo "no changes"
          git push
