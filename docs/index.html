<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RERA India — Registered Projects</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--ink:#e2e8f0;--mut:#94a3b8;--acc:#38bdf8;--line:#334155}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{padding:18px 24px;border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0}
  .sub{color:var(--mut);font-size:12px}
  .wrap{padding:20px 24px;max-width:1300px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
  .stat b{font-size:22px;display:block}.stat span{color:var(--mut);font-size:12px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
  input,select,button{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit}
  button{cursor:pointer;background:var(--acc);color:#04263a;border:0;font-weight:600}
  button.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--mut);font-weight:600}
  tr:hover td{background:#243247}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:#064e3b;color:#6ee7b7}
  .bar{display:flex;justify-content:space-between;align-items:center;margin:12px 0;gap:10px;flex-wrap:wrap}
  .mut{color:var(--mut)}
</style>
</head>
<body>
<header>
  <h1>🏗️ RERA India — Registered Projects</h1>
  <span class="sub">Static dashboard · data refreshed automatically by GitHub Actions · <span id="gen"></span></span>
</header>
<div class="wrap">
  <div class="cards" id="stats"></div>
  <div class="filters">
    <input id="search" placeholder="Search project / promoter / reg no…">
    <select id="state"><option value="">All states</option></select>
    <select id="district"><option value="">All districts</option></select>
    <input id="promoter" placeholder="Promoter contains…">
    <select id="ptype"><option value="">Any type</option></select>
  </div>
  <div class="bar">
    <div><button class="ghost" onclick="reset()">Reset</button>
      <button class="ghost" onclick="newWeek()">🆕 New this week</button></div>
    <div><span class="mut" id="count"></span>
      <button class="ghost" onclick="exportCsv()">⬇ Export CSV</button></div>
  </div>
  <table>
    <thead><tr><th>State</th><th>Reg No</th><th>Project</th><th>Promoter</th>
      <th>District</th><th>Type</th><th>Units</th><th>Status</th><th>First seen</th></tr></thead>
    <tbody id="rows"><tr><td colspan="9" class="mut">Loading…</td></tr></tbody>
  </table>
  <div class="bar"><button class="ghost" onclick="page(-1)">← Prev</button>
    <span class="mut" id="pageinfo"></span>
    <button class="ghost" onclick="page(1)">Next →</button></div>
</div>
<script>
let DATA=[], view=[], offset=0, limit=100, sinceDate="";
const $=id=>document.getElementById(id);

async function boot(){
  const d = await (await fetch('projects.json?_='+Date.now())).json();
  DATA = d.projects; $('gen').textContent = 'updated '+(d.generated_at||'').slice(0,16).replace('T',' ');
  const uniq=(k)=>[...new Set(DATA.map(r=>r[k]).filter(Boolean))].sort();
  uniq('state').forEach(s=>$('state').append(new Option(s,s)));
  uniq('district').forEach(s=>$('district').append(new Option(s,s)));
  uniq('project_type').forEach(s=>$('ptype').append(new Option(s,s)));
  const by=d.by_state||{}; const top=Object.entries(by).sort((a,b)=>b[1]-a[1]).slice(0,3);
  $('stats').innerHTML = card(d.total.toLocaleString(),'Total projects')
    + top.map(([s,n])=>card(n.toLocaleString(),s)).join('')
    + card(Object.keys(by).length,'States covered');
  apply();
}
const card=(b,s)=>`<div class="stat"><b>${b}</b><span>${s}</span></div>`;

function apply(){
  const s=$('search').value.toLowerCase(), st=$('state').value, di=$('district').value,
        pr=$('promoter').value.toLowerCase(), pt=$('ptype').value;
  view = DATA.filter(r=>{
    if(st && r.state!==st) return false;
    if(di && r.district!==di) return false;
    if(pt && r.project_type!==pt) return false;
    if(pr && !(r.promoter_name||'').toLowerCase().includes(pr)) return false;
    if(sinceDate && (r.first_seen||'') < sinceDate) return false;
    if(s){const h=`${r.project_name} ${r.promoter_name} ${r.rera_reg_no}`.toLowerCase(); if(!h.includes(s))return false;}
    return true;
  });
  offset=0; render();
}
function render(){
  const slice=view.slice(offset,offset+limit);
  $('rows').innerHTML = slice.length? slice.map(r=>`<tr>
    <td>${r.state}</td><td>${r.rera_reg_no||''}</td><td>${r.project_name||''}</td>
    <td>${r.promoter_name||''}</td><td>${r.district||''}</td><td>${r.project_type||''}</td>
    <td>${r.total_units||''}</td><td><span class="pill">${r.status||''}</span></td>
    <td class="mut">${(r.first_seen||'').slice(0,10)}</td></tr>`).join('')
    : '<tr><td colspan="9" class="mut">No matching projects.</td></tr>';
  $('count').textContent = view.length.toLocaleString()+' match';
  $('pageinfo').textContent = view.length? `${offset+1}–${Math.min(offset+limit,view.length)} of ${view.length.toLocaleString()}`:'';
}
function page(dir){const n=offset+dir*limit; if(n>=0&&n<view.length){offset=n;render();}}
function reset(){['search','promoter'].forEach(i=>$(i).value=''); ['state','district','ptype'].forEach(i=>$(i).value=''); sinceDate=''; apply();}
function newWeek(){sinceDate=new Date(Date.now()-7*864e5).toISOString().slice(0,10); apply();}
function exportCsv(){
  const cols=['state','rera_reg_no','project_name','promoter_name','district','project_type','total_units','status','first_seen'];
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[cols.join(',')].concat(view.map(r=>cols.map(c=>esc(r[c])).join(','))).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='rera_export.csv'; a.click();
}
['search','promoter'].forEach(i=>$(i).addEventListener('input',apply));
['state','district','ptype'].forEach(i=>$(i).addEventListener('change',apply));
boot();
</script>
</body>
</html>
