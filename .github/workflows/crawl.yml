name: RERA crawl

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rera-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape (all implemented states)
        run: |
          python run.py || true
          python export_json.py

      - name: Commit refreshed data (resilient push)
        run: |
          git config user.name  "rera-bot"
          git config user.email "rera-bot@users.noreply.github.com"
          git add rera_data.sqlite docs/projects.json
          git commit -m "data: automated RERA refresh $(date -u +%F)" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            if git push; then echo "pushed"; exit 0; fi
            echo "push retry $i"; sleep 7
          done
          echo "push failed after retries"; exit 1
